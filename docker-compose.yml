# Single-service dev environment. The host repo is bind-mounted so you edit
# files locally and run them in the container with a known-good Spark stack.
services:
  pipeline:
    build: .
    image: eu-job-market-pipeline
    env_file:
      - .env
    volumes:
      - ./:/app
    working_dir: /app
    # Run the full pipeline on startup, then keep the container alive so
    # `make <target>` can exec into it repeatedly.
    command: sh -lc "python pipelines/run_all.py && tail -f /dev/null"
